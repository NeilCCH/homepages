>\n              <h2 style=\"font-family:'Noto Sans TC',sans-serif; font-size:37px; font-weight:700; margin:0 0 20px;\">關於我<\u002Fh2>\n              <p style=\"font-size:17px; line-height:2; color:{{optD.theme.muted}};\">水瓶座．A型 — 或許正是這樣理性又不安於現狀的性格，讓我在管理的路上始終保持好奇與行動力，也習慣用長遠的眼光看待團隊的成長。<\u002Fp>\n              <p style=\"font-size:17px; line-height:2; color:{{optD.theme.muted}};\">投身保險業超過三十年，從基層做起——外勤業務、內勤行政、內外勤團隊管理，歷練至今，一路見證團隊發展與個人經驗的成長，時至今日才得以管理數百人規模的團隊。<br>現階段擔任高階經理人，著重在人員管理、業務推動、組織發展、人才招募與培訓等面向，並將宏觀的市場觀察視為附加優勢，協助團隊掌握趨勢。<\u002Fp>\n              <p style=\"font-size:17px; line-height:2; color:{{optD.theme.muted}};\">我始終相信，卓越的團隊來自合理的制度與真誠的溝通——制度給予方向，溝通建立信任。這些年帶領不管是內勤行政團隊或是業務團隊，皆締造亮眼成績佳績，常年獲得公司內部的典範主管金獎，也持續蟬聯 IDA國際龍獎主管獎榮譽。但比起數字，更讓我珍惜的是看著夥伴一步步從新人成長為獨當一面的主管，直至成功。<\u002Fp>\n              <p style=\"font-size:17px; line-height:2; color:{{optD.theme.muted}};\">工作之餘，我喜歡透過高爾夫球、氣瓶潛水與超慢跑來保持身心活力，享受休閒潛水時在水下世界的寧靜，也熱愛背起行囊自由行或獨旅，在旅途中沉澱思緒。此外，我也對 AI 科技充滿興趣，時常學習並嘗試各項 AI 工具的應用與圖像創作。慶幸這些豐富的生活體驗，都能在這份工作中得到平衡與滿足。如果您也在尋找值得託付的領導者與事業夥伴，或對保險行業有興趣，歡迎與我聯繫，討論如何協助您創造未來坦途。<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{optD.isSkills}}\" hint-placeholder-val=\"{{false}}\">\n            <div key=\"d-skills\" style=\"animation:panelIn .55s ease; {{optD.mobileClearStyle}}\">\n              <h2 style=\"font-family:'Noto Sans TC',sans-serif; font-size:37px; font-weight:700; margin:0 0 28px;\">專業能力<\u002Fh2>\n              <div style=\"display:flex; flex-direction:column; gap:0;\">\n                <sc-for list=\"{{skills}}\" as=\"s\" hint-placeholder-count=\"6\">\n                  <div style=\"display:flex; gap:20px; padding:18px 0; border-bottom:1px solid {{optD.theme.border}};\">\n                    <div style=\"width:34px; flex-shrink:0; display:flex; align-items:flex-start; padding-top:2px;\">\n                      <svg sc-camel-view-box=\"0 0 24 24\" width=\"22\" height=\"22\" fill=\"none\" stroke=\"{{optD.theme.accent}}\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"{{s.icon}}\"><\u002Fpath><\u002Fsvg>\n                    <\u002Fdiv>\n                    <div>\n                      <div style=\"font-size:18px; font-weight:700; margin-bottom:4px;\">{{s.title}}<\u002Fdiv>\n                      <div style=\"font-size:15px; color:{{optD.theme.muted}}; line-height:1.7;\">{{s.desc}}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{optD.isPortfolio}}\" hint-placeholder-val=\"{{false}}\">\n            <div key=\"d-portfolio\" style=\"animation:panelIn .55s ease; {{optD.mobileClearStyle}}\">\n              <h2 style=\"font-family:'Noto Sans TC',sans-serif; font-size:37px; font-weight:700; margin:0 0 28px;\">領導成效<\u002Fh2>\n              <div style=\"display:flex; flex-direction:column; gap:16px;\">\n                <sc-for list=\"{{portfolioItems}}\" as=\"p\" hint-placeholder-count=\"3\">\n                  <div style=\"border:1px solid {{optD.theme.border}}; border-radius:12px; padding:22px 24px; background:{{optD.theme.surface}}; display:flex; justify-content:space-between; gap:20px; flex-wrap:wrap;\">\n                    <div>\n                      <div style=\"font-size:20px; font-weight:700; margin-bottom:8px;\">{{p.title}}<\u002Fdiv>\n                      <div style=\"font-size:15px; color:{{optD.theme.muted}}; line-height:1.7; max-width:480px;\">{{p.desc}}<\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"font-size:13px; color:{{optD.theme.accent}}; font-weight:700; white-space:nowrap;\">{{p.edit}}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{optD.isBlog}}\" hint-placeholder-val=\"{{false}}\">\n            <div key=\"d-blog\" style=\"animation:panelIn padding:0; cursor:pointer;\">Facebook<\u002Fbutton>\n                            <button sc-camel-on-click=\"{{b.copyLink}}\" title=\"複製引用\" style=\"border:none; background:transparent; color:{{optD.theme.muted}}; font-size:14px; font-weight:700; padding:0; cursor:pointer;\">複製引用<\u002Fbutton>\n                          <\u002Fsc-if>\n                          <sc-if value=\"{{optD.isAdmin}}\" hint-placeholder-val=\"{{false}}\">\n                            <button sc-camel-on-click=\"{{b.startEdit}}\" style=\"border:none; background:transparent; color:{{optD.theme.muted}}; font-size:14px; font-weight:700; padding:0; cursor:pointer;\">編輯<\u002Fbutton>\n                            <button sc-camel-on-click=\"{{b.deletePost}}\" style=\"border:none; background:transparent; color:#c0392b; font-size:14px; font-weight:700; padding:0; cursor:pointer;\">刪除<\u002Fbutton>\n                          <\u002Fsc-if>\n                        <\u002Fdiv>\n                      <\u002Fdiv>\n                      <div style=\"font-size:14px; color:{{optD.theme.accent}}; font-weight:700; white-space:nowrap;\">{{b.date}}<\u002Fdiv>\n                    <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{optD.isContact}}\" hint-placeholder-val=\"{{false}}\">\n            <div key=\"d-contact\" style=\"animation:panelIn .55s ease; max-width:480px; {{optD.mobileClearStyle}}\">\n              <h2 style=\"font-family:'Noto Sans TC',sans-serif; font-size:37px; font-weight:700; margin:0 0 24px;\">與我聯繫<\u002Fh2>\n              <div style=\"font-size:17px; line-height:2; color:{{optD.theme.muted}}; margin-bottom:20px;\">\n                <div>Email：neo0935@gmail.com<\u002Fdiv>\n              <\u002Fdiv>\n              <a href=\"https://calendar.google.com/calendar/appointments/schedules/YOUR_SCHEDULE_ID\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex; align-items:center; gap:8px; background:{{optD.theme.accent}}; color:{{optD.theme.accentText}}; font-weight:700; font-size:16px; padding:14px 30px; border-radius:8px; text-decoration:none; margin-bottom:28px;\"><svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"16\" rx=\"2\" stroke=\"currentColor\" stroke-width=\"1.8\"><\u002Frect><path d=\"M3 9h18M8 3v4M16 3v4\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M8 13h2v2H8zM11 13h2v2h-2zM14 13h2v2h-2z\" fill=\"currentColor\"><\u002Fpath><\u002Fsvg>預約諮詢<\u002Fa>\n              <div style=\"display:flex; gap:12px;\">\n                <sc-for list=\"{{socials}}\" as=\"soc\" hint-placeholder-count=\"4\">\n                  <a href=\"{{soc.href}}\" target=\"_blank\" rel=\"noopener\" style=\"width:60px; height:60px; border-radius:50%; border:1px solid {{optD.theme.border}}; display:flex; align-items:center; justify-content:center; color:{{optD.theme.text}}; text-decoration:none;\" sc-camel-dangerously-set-inner-h-t-m-l=\"{{soc.iconHtml}}\"><\u002Fa>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n        <\u002Fmain>\n      <\u002Fsection>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    themeById: { d: 'dark' },\n    tabById: { d: 'home' },\n    isMobile: false,\n    blogSearch: '',\n    blogCategory: 'all',\n    blogExpanded: {},\n    shareOpenById: {},\n    blogPosts: [],\n    showComposer: false,\n    composerTitle: '',\n    composerCategory: '高資產洞察',\n    composerExcerpt: '',\n    aiTopic: '總經趨勢解析',\n    aiCustomTopic: '',\n    aiAudience: '業務員',\n    aiLoading: false,\n    editingPostId: null,\n    editTitle: '',\n    editCategory: '',\n    editExcerpt: '',\n    isAdmin: false,\n    showLogin: false,\n    loginEmail: '',\n    loginPassword: '',\n    loginError: false,\n  };\n\n  blogPostsData = [];\n\n  get defaultPosts() { return []; }\n\n  nav = [\n    { key: 'home', label: '首頁', tint: 'oklch(63% 0.03 250)' },\n    { key: 'about', label: '關於我', tint: 'oklch(68% 0.05 220)' },\n    { key: 'skills', label: '專業能力', tint: 'oklch(72% 0.06 190)' },\n    { key: 'portfolio', label: '領導成效', tint: 'oklch(75% 0.07 90)' },\n    { key: 'blog', label: '知識筆記', tint: 'oklch(70% 0.04 280)' },\n    { key: 'contact', label: '與我聯繫', tint: 'oklch(66% 0.05 30)' },\n  ];\n\n  configs = {\n    d: {\n      dark: { bg:'#0B1420', surface:'#101B2B', text:'#E9EEF3', muted:'#93A2B3', accent:'#B9C4CE', accentText:'#0B1420', border:'#24344A' },\n      light:{ bg:'#F3F6F9', surface:'#FFFFFF', text:'#101B2B', muted:'#5B6B7D', accent:'#46607A', accentText:'#FFFFFF', border:'#D7DEE6' },\n    },\n  };\n\n  componentDidMount() {\n    try {\n      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;\n      this.setState(s => ({ themeById: { d: prefersDark ? 'dark' : 'light' } }));\n    } catch (e) {}\n    this.subscribeToPosts();\n    this.subscribeToAuth();\n  }\n\n  subscribeToPosts(retries = 0) {\n    if (!window.__pbsDb) {\n      if (retries > 50) return;\n      setTimeout(() => this.subscribeToPosts(retries + 1), 200);\n      return;\n    }\n    const { db, collection, onSnapshot, query, orderBy } = window.__pbsDb;\n    try {\n      const q = query(collection(db, 'posts'), orderBy('createdAt', 'desc'));\n      this.unsubPosts = onSnapshot(q, (snap) => {\n        const posts = snap.docs.map(d => {\n          const data = d.data();\n          const ts = data.createdAt && data.createdAt.toDate ? data.createdAt.toDate() : new Date();\n          const date = `${ts.getFullYear()}.${String(ts.getMonth()+1).padStart(2,'0')}.${String(ts.getDate()).padStart(2,'0')}`;\n          return { id: d.id, ...data, date };\n        });\n        this.blogPostsData = posts.length ? posts : this.defaultPosts;\n        this.forceUpdate();\n      }, () => { this.blogPostsData = this.defaultPosts; this.forceUpdate(); });\n    } catch (e) {}\n  }\n\n  subscribeToAuth(retries = 0) {\n    if (!window.__pbsDb || !window.__pbsDb.auth) {\n      if (retries > 50) return;\n      setTimeout(() => this.subscribeToAuth(retries + 1), 200);\n      return;\n    }\n    const { auth, onAuthStateChanged } = window.__pbsDb;\n    this.unsubAuth = onAuthStateChanged(auth, (user) => {\n      this.setState({ isAdmin: !!user });\n    });\n  }\n\n  componentWillUnmount() {\n    try { if (this.ro) this.ro.disconnect(); } catch (e) {}\n    try { if (this.unsubPosts) this.unsubPosts(); } catch (e) {}\n    try { if (this.unsubAuth) this.unsubAuth(); } catch (e) {}\n  }\n\n  rootRef = (el) => {\n    if (!el || this.rootEl === el) return;\n    this.rootEl = el;\n    if (this.ro) this.ro.disconnect();\n    this.ro = new ResizeObserver((entries) => {\n      const w = entries[0].contentRect.width;\n      this.setState((s) => (s.isMobile === (w <= 767) ? null : { isMobile: w <= 767 }));\n    });\n    this.ro.observe(el);\n  };\n\n  toggleTheme(id) {\n    this.setState(s => ({ themeById: { ...s.themeById, [id]: s.themeById[id] === 'dark' ? 'light' : 'dark' } }));\n  }\n\n  setTab(id, tab) {\n    this.setState(s => ({ tabById: { ...s.tabById, [id]: tab } }));\n  }\n\n  onMove(id, e) {\n    const rect = e.currentTarget.getBoundingClientRect();\n    const x = e.clientX - rect.left;\n    const y = e.clientY - rect.top;\n    const glow = document.getElementById('glow-' + id);\n    if (glow) { glow.style.left = x + 'px'; glow.style.top = y + 'px'; }\n  }\n\n  setBlogSearch(v) { this.setState({ blogSearch: v }); }\n  setBlogCategory(c) { this.setState({ blogCategory: c }); }\n  toggleBlogExpand(pid) { this.setState(s => ({ blogExpanded: { ...s.blogExpanded, [pid]: !s.blogExpanded[pid] } })); }\n\n  toggleComposer() { this.setState(s => ({ showComposer: !s.showComposer })); }\n  toggleLogin() { this.setState(s => ({ showLogin: !s.showLogin, loginEmail: '', loginPassword: '', loginError: false })); }\n  setLoginEmail(v) { this.setState({ loginEmail: v, loginError: false }); }\n  setLoginPassword(v) { this.setState({ loginPassword: v, loginError: false }); }\n  async submitLogin() {\n    const email = (this.state.loginEmail || '').trim();\n    const password = this.state.loginPassword || '';\n    if (!email || !password) { this.setState({ loginError: true }); return; }\n    if (!window.__pbsDb || !window.__pbsDb.auth) { this.setState({ loginError: true }); return; }\n    const { auth, signInWithEmailAndPassword } = window.__pbsDb;\n    try {\n      await signInWithEmailAndPassword(auth, email, password);\n      this.setState({ isAdmin: true, showLogin: false, loginEmail: '', loginPassword: '', loginError: false });\n    } catch (e) {\n      this.setState({ loginError: true });\n    }\n  }\n  logoutAdmin() {\n    try { if (window.__pbsDb && window.__pbsDb.auth) window.__pbsDb.signOut(window.__pbsDb.auth); } catch (e) {}\n    this.setState({ isAdmin: false, showComposer: false });\n  }\n\n  setComposerField(field, v) { this.setState({ [field]: v }); }\n  setAiTopic(t) { this.setState({ aiTopic: t }); }\n  setAiCustomTopic(v) { this.setState({ aiCustomTopic: v, aiTopic: v ? '__custom__' : this.state.aiTopic }); }\n  setAiAudience(v) { this.setState({ aiAudience: v }); }\n  async generateWithAI() {\n    this.setState({ aiLoading: true });\n    try {\n      const topic = this.state.aiTopic === '__custom__' ? this.state.aiCustomTopic.trim() : this.state.aiTopic;\n      const category = this.state.composerCategory;\n      const audience = this.state.aiAudience;\n      const audienceAngle = audience === '業務員' ? '以業務員為主要讀者，聚焦第一線實戰的方法與心態'\n        : audience === '業務主管' ? '以業務主管／管理者為主要讀者，聚焦組織管理、團隊帶領與制度設計'\n        : '以客戶為主要讀者，聚焦保障規劃與信任建立，避免內部管理術語';\n      const prompt = `你是一位有 30 年資歷的保險業資深主管（資深業務協理），正在自己的部落格發表一篇文章。請以「${topic}」為主題，寫一篇知識筆記部落格文章，分類為「${category}」。${audienceAngle}。請用第一人稱、自然口語但專業的語氣，像資深前輩分享真實心得，不要像 AI 或教科書。避免制式 AI 腔（例如「首先、其次、再者、總而言之、綜上所述、在當今這個時代、隨著…的發展」這類套話），也不要無意義的條列堆疊；用具體的觀察、原則與做法帶出洞見，語氣溫暖、務實、重視制度與真誠陪伴。用繁體中文（台灣用語）。輸出格式必須是純JSON，不要有其他文字：{\"title\":\"文章標題(20字內)\",\"body\":\"文章內容(600-1000字，可分段用\\\\n\\\\n)\"}`;\n      if (!window.__pbsAI || !window.__pbsAI.generate) throw new Error('AI 尚未啟用');\n      const text = await window.__pbsAI.generate(prompt);\n      let data;\n      try { data = JSON.parse(text); } catch (e) {\n        const m = text.match(/\\{[\\s\\S]*\\}/);\n        data = m ? JSON.parse(m[0]) : { title: topic, body: text };\n      }\n      this.setState({ composerTitle: data.title || topic, composerExcerpt: data.body || '', aiLoading: false });\n    } catch (e) {\n      this.setState({ aiLoading: false });\n      try { window.alert('AI 生成失敗，請確認 Firebase AI Logic 已啟用，或稍後再試。'); } catch (_) {}\n    }\n  }\n  publishPost() {\n    const title = this.state.composerTitle.trim();\n    const excerpt = this.state.composerExcerpt.trim();\n    if (!title || !excerpt) return;\n    const category = this.state.composerCategory;\n    this.setState({ composerTitle: '', composerExcerpt: '', showComposer: false });\n    if (window.__pbsDb) {\n      const { db, collection, addDoc, serverTimestamp } = window.__pbsDb;\n      addDoc(collection(db, 'posts'), { title, excerpt, full: excerpt, category, createdAt: serverTimestamp() }).catch(() => {});\n    } else {\n      const now = new Date();\n      const date = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;\n      this.blogPostsData = [{ id: 'u' + Date.now(), title, date, category, excerpt, full: excerpt }, ...this.blogPostsData];\n      this.forceUpdate();\n    }\n  }\n\n  startEditPost(post) {\n    this.setState({ editingPostId: post.id, editTitle: post.title, editCategory: post.category, editExcerpt: post.full || post.excerpt });\n  }\n  cancelEditPost() { this.setState({ editingPostId: null }); }\n  setEditField(field, v) { this.setState({ [field]: v }); }\n  saveEditPost() {\n    const id = this.state.editingPostId;\n    const title = this.state.editTitle.trim();\n    const excerpt = this.state.editExcerpt.trim();\n    const category = this.state.editCategory;\n    if (!id || !title || !excerpt) return;\n    if (window.__pbsDb) {\n      const { db, doc, updateDoc } = window.__pbsDb;\n      updateDoc(doc(db, 'posts', id), { title, excerpt, full: excerpt, category }).catch(() => {});\n    } else {\n      this.blogPostsData = this.blogPostsData.map(p => p.id === id ? { ...p, title, excerpt, full: excerpt, category } : p);\n      this.forceUpdate();\n    }\n    this.setState({ editingPostId: null });\n  }\n\n  deletePost(post) {\n    if (!window.confirm('確定要刪除這篇文章嗎？此動作無法復原。')) return;\n    const id = post.id;\n    if (window.__pbsDb && window.__pbsDb.deleteDoc) {\n      const { db, doc, deleteDoc } = window.__pbsDb;\n      deleteDoc(doc(db, 'posts', id)).catch(() => {});\n    } else {\n      this.blogPostsData = this.blogPostsData.filter(p => p.id !== id);\n      this.forceUpdate();\n    }\n    if (this.state.editingPostId === id) this.setState({ editingPostId: null });\n  }\n\n  siteUrl() {\n    try { return window.location.origin + window.location.pathname; } catch (e) { return 'https://neilcch.github.io/homepages/'; }\n  }\n  shareText(post) {\n    const body = (post.full || post.excerpt || '').replace(/\\s+/g, ' ').trim();\n    const snip = body.length > 60 ? body.slice(0, 60) + '…' : body;\n    return '「' + post.title + '」\\n' + (snip ? snip + '\\n\\n' : '') + '—— 鄭志弘 資深業務協理｜知識筆記';\n  }\n  shareTo(platform, post) {\n    const url = this.siteUrl();\n    const text = this.shareText(post);\n    let target = '';\n    if (platform === 'line') target = 'https://social-plugins.line.me/lineit/share?url=' + encodeURIComponent(url) + '&text=' + encodeURIComponent(text);\n    else if (platform === 'fb') target = 'https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(url) + '&quote=' + encodeURIComponent(text);\n    if (target) window.open(target, '_blank', 'noopener,noreferrer');\n  }\n  toggleShare(pid) {\n    this.setState(s => ({ shareOpenById: { ...s.shareOpenById, [pid]: !s.shareOpenById[pid] } }));\n  }\n  async copyShare(post) {\n    const shareStr = this.shareText(post) + '\\n' + this.siteUrl();\n    try { await navigator.clipboard.writeText(shareStr); window.alert('已複製分享內容與網址！'); }\n    catch (e) { window.prompt('複製以下內容分享：', shareStr); }\n  }\n\n  buildOption(id) {\n    const cfg = this.configs[id];\n    const themeMode = this.state.themeById[id];\n    const theme = themeMode === 'dark' ? cfg.dark : cfg.light;\n    const tab = this.state.tabById[id];\n    const isMobile = this.state.isMobile;\n    const navItems = this.nav.map(n => ({\n      key: n.key,\n      label: n.label,\n      onClick: () => this.setTab(id, n.key),\n      bg: n.key === tab ? n.tint : `color-mix(in oklch, ${n.tint} 22%, ${theme.surface})`,\n      color: n.key === tab ? '#FFFFFF' : theme.text,\n    }));\n\n    const sectionStyle = `width:100%; ${isMobile ? 'height:100%; overflow:hidden;' : 'height:100%;'} border-radius:0; overflow:hidden; position:relative; box-shadow:0 40px 90px rgba(0,0,0,.35); background:${theme.bg}; color:${theme.text}; font-family:'Noto Sans TC','Manrope',sans-serif; transition:background .4s,color .4s; display:flex; flex-direction:${isMobile ? 'column' : 'row'};`;\n\n    const asideStyle = isMobile\n      ? `position:relative; z-index:1; width:100%; height:28.5714vh; flex-shrink:0; box-sizing:border-box; display:flex; flex-direction:column; padding:8px 16px; border-bottom:1px solid ${theme.border};`\n      : `position:relative; z-index:1; width:280px; flex-shrink:0; display:flex; flex-direction:column; padding:40px 28px; border-right:1px solid ${theme.border};`;\n\n    const identityRowStyle = isMobile\n      ? 'display:flex; align-items:center; justify-content:space-between; flex:1;'\n      : 'display:block; margin-bottom:0;';\n\n    const showAvatar = tab === 'home' || tab === 'about';\n    const avatarStageStyle = (!showAvatar || (tab === 'home' && isMobile))\n      ? 'display:none;'\n      : `position:absolute; z-index:2; top:${isMobile ? '14px' : '24px'}; right:${isMobile ? '14px' : '24px'}; width:clamp(156px, ${isMobile ? '41vmin' : '46vmin'}, ${isMobile ? '228px' : '348px'}); aspect-ratio:1/1.15; overflow:hidden;`;\n\n    const avatarGeoStyle = `position:absolute; top:8%; left:4%; width:82%; height:82%; background:${theme.accent}; opacity:.20; clip-path:polygon(50% 0%, 100% 22%, 100% 78%, 50% 100%, 0% 78%, 0% 22%); z-index:1;`;\n\n    const avatarGeoStyle2 = `position:absolute; bottom:-9%; right:-9%; width:72%; height:72%; background:${theme.accent}; opacity:.30; clip-path:polygon(0% 0%, 100% 0%, 0% 100%); transform:rotate(180deg); z-index:1;`;\n\n    const avatarPhotoStyle = `position:absolute; top:-6%; left:14%; width:92%; height:96%; z-index:2; filter:drop-shadow(0 20px 30px rgba(0,0,0,.45));`;\n\n    const navStyle = isMobile\n      ? 'display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(2,1fr); gap:5px; flex:1;'\n      : 'display:flex; flex-direction:column; gap:4px; flex:1;';\n\n    const navItemStyle = isMobile\n      ? \"border:none; text-align:center; font-family:'Noto Sans TC',sans-serif; font-weight:700; font-size:clamp(12px,3.4vw,14px); padding:2px 4px; border-radius:8px; cursor:pointer; transition:all .25s; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; display:flex; align-items:center; justify-content:center;\"\n      : \"border:none; text-align:left; font-family:'Noto Sans TC',sans-serif; font-size:15px; font-weight:700; padding:11px 14px 11px 14px; border-radius:8px; cursor:pointer; transition:all .25s; display:flex; align-items:center;\";\n\n    const toggleWrapStyle = isMobile ? 'margin:0;' : 'margin-top:20px;';\n\n    const mainStyle = isMobile\n      ? `position:relative; z-index:1; height:71.4286vh; padding:20px 20px 24px; overflow-y:auto; box-sizing:border-box;`\n      : `position:relative; z-index:1; flex:1; padding:56px; overflow-y:auto; box-sizing:border-box;`;\n\n    const heroColStyle = 'max-width:max(320px, calc(100% - 380px));';\n\n    const heroTitleStyle = `font-family:'Noto Sans TC',sans-serif; line-height:1.2; font-weight:900; margin:0 0 22px; font-size:clamp(30px, 4.2vw, 50px);`;\n\n    const mobileClearStyle = (isMobile && tab === 'about') ? 'padding-top:clamp(200px, 46vmin, 280px);' : '';\n\n    const aboutColStyle = isMobile\n      ? ''\n      : 'max-width:max(320px, calc(100% - 380px));';\n\n    const homeMobileWrapStyle = `display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; grid-template-areas:'title photo' 'body creds'; column-gap:16px; row-gap:4px; height:100%; animation:panelIn .55s ease;`;\n    const homeMobileTitleStyle = `grid-area:title; font-family:'Noto Sans TC',sans-serif; font-weight:900; line-height:1.2; font-size:clamp(16px,4.9vw,24px); margin:0; display:flex; align-items:center; word-break:keep-all; overflow-wrap:normal;`;\n    const homeMobilePhotoStyle = `grid-area:photo; position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center;`;\n    const homeMobilePhotoInnerStyle = `position:relative; width:100%; max-height:100%; aspect-ratio:1/1.15; border-radius:14px; overflow:hidden; margin:auto;`;\n    const homeMobileBodyStyle = `grid-area:body; font-size:14px; line-height:1.6; color:${theme.muted}; overflow-y:auto; margin:0;`;\n    const homeMobileCredsStyle = `grid-area:creds; display:flex; flex-direction:column; gap:6px; align-items:flex-start; justify-content:flex-start; overflow-y:auto; align-self:start;`;\n\n    const categories = ['all', '高資產洞察', '領導與管理', 'AI與數位創新', '生活隨筆'];\n    const blogCategories = categories.map(c => ({\n      key: c,\n      label: c === 'all' ? '全部' : c,\n      onClick: () => this.setBlogCategory(c),\n      bg: this.state.blogCategory === c ? theme.accent : 'transparent',\n      color: this.s
