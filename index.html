  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ace {\n  font-family: 'Playfair Display';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"f0effac6-ca7f-449a-8f4e-c608a0196975\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>\n    body { margin:0; background:#0d0d0d; }\n    @keyframes panelIn { from { opacity:0; transform:translateY(14px);} to { opacity:1; transform:translateY(0);} }\n    @keyframes floatIn { from { opacity:0; transform:translateY(24px);} to { opacity:1; transform:translateY(0);} }\n    ::selection { background:#C9A22755; }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:'Manrope',sans-serif;\">\n      <section sc-camel-on-mouse-move=\"{{optD.onMove}}\" style=\"{{optD.sectionStyle}}\">\n        <div id=\"glow-d\" style=\"position:absolute; width:560px; height:560px; border-radius:50%; pointer-events:none; left:0; top:0; transform:translate(-50%,-50%); background:radial-gradient(circle, {{optD.theme.accent}}22, transparent 70%); filter:blur(10px); z-index:0;\"><\u002Fdiv>\n\n<aside style=\"{{optD.asideStyle}}\">\n          <div style=\"{{optD.identityRowStyle}}\">\n            <div>\n              <div style=\"font-family:'Bodoni Moda',serif; font-size:24px; font-weight:600;\">鄭 志弘<\u002Fdiv>\n              <div style=\"font-size:14px; color:{{optD.theme.muted}}; margin:6px 0 0; line-height:1.6;\">資深業務協理<br>專業經理人<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <nav style=\"{{optD.navStyle}}\">\n            <sc-for list=\"{{optD.navItems}}\" as=\"item\" hint-placeholder-count=\"6\">\n              <button sc-camel-on-click=\"{{item.onClick}}\" style=\"{{optD.navItemStyle}} background:{{item.bg}}; color:{{item.color}};\">{{item.label}}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fnav>\n\n          <div style=\"{{optD.toggleWrapStyle}}\">\n            <button sc-camel-on-click=\"{{optD.toggleTheme}}\" style=\"border:1px solid {{optD.theme.border}}; background:transparent; color:{{optD.theme.text}}; font-size:13px; font-weight:600; padding:9px 16px; border-radius:8px; cursor:pointer; white-space:nowrap;\">{{optD.themeLabel}}<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Faside><main style=\"{{optD.mainStyle}}\">\n\n          <div style=\"{{optD.avatarStageStyle}}\">\n            <div style=\"{{optD.avatarGeoStyle}}\"><\u002Fdiv>\n            <div style=\"{{optD.avatarGeoStyle2}}\"><\u002Fdiv>\n            <div style=\"{{optD.avatarPhotoStyle}}\">\n              <x-import component-from-global-scope=\"image-slot\" from=\"b917ae71-d92d-4410-b610-830401f4de1e#/image-slot.js\" id=\"avatar-d\" shape=\"rect\" radius=\"0\" placeholder=\"放上去背透明PNG個人照\" hint-size=\"100%,100%\"><\u002Fx-import>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{optD.isHome}}\" hint-placeholder-val=\"{{true}}\">\n<div key=\"d-home\" style=\"animation:panelIn .55s ease;\">\n              \n              \n              <h1 style=\"width: 450px; height: 164px; font-size: 43px\">以人為本的管理哲學<br data-om-id=\"7d7822b7:40\">帶領團隊穩健成長<br data-om-id=\"7d7822b7:41\"><\u002Fh1>\n              <p style=\"font-size: 16px; line-height: 1.9; color: {{optD.theme.muted}}; max-width: 560px; margin: 0 0 24px; width: 318px; height: 125px\">在保險業深耕多年，目前帶領數百人的業務團隊，專注於組織發展、績效管理與人才培育，相信卓越的團隊來自清晰的制度與真誠的陪伴。<\u002Fp><div style=\"display:flex; gap:10px; flex-wrap:wrap; margin-bottom:32px;\">\n                <sc-for list=\"{{credentials}}\" as=\"cred\" hint-placeholder-count=\"3\">\n                  <div style=\"border:1px solid {{optD.theme.border}}; color:{{optD.theme.accent}}; font-size:12px; font-weight:700; letter-spacing:.04em; padding:7px 14px; border-radius:999px;\">{{cred.label}}<\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"display:flex; gap:14px; flex-wrap:wrap;\">\n                <button sc-camel-on-click=\"{{optD.goContact}}\" style=\"border:none; background:{{optD.theme.accent}}; color:{{optD.theme.accentText}}; font-weight:700; font-size:15px; padding:14px 30px; border-radius:8px; cursor:pointer;\">與我聯繫<\u002Fbutton>\n                <button sc-camel-on-click=\"{{optD.goPortfolio}}\" style=\"border:1px solid {{optD.theme.border}}; background:transparent; color:{{optD.theme.text}}; font-weight:600; font-size:15px; padding:14px 30px; border-radius:8px; cursor:pointer;\">查看實績<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{optD.isAbout}}\" hint-placeholder-val=\"{{false}}\">\n            <div key=\"d-about\" style=\"animation:panelIn .55s ease; max-width:640px;\">\n              <h2 style=\"font-family:'Bodoni Moda',serif; font-size:34px; font-weight:600; margin:0 0 20px;\">關於我<\u002Fh2>\n              <p style=\"font-size:16px; line-height:2; color:{{optD.theme.muted}};\">水瓶座．A型 —— 或許正是這樣理性又不安於現狀的性格，讓我在管理的路上始終保持好奇與行動力，也習慣用長遠的眼光看待團隊的成長。<\u002Fp>\n              <p style=\"font-size:16px; line-height:2; color:{{optD.theme.muted}};\">投身保險業超過三十年，從基層做起——外勤業務、內勤行政、內外勤團隊管理，歷練至今，一路見證團隊發展與個人經驗的成長，時至今日才得以管理數百人規模的團隊。<br>現階段擔任高階經理人，著重在人員管理、業務推動、組織發展、市場觀察及分析、人才招募與培訓等面向。<\u002Fp>\n              \n              <p style=\"font-size:16px; line-height:2; color:{{optD.theme.muted}};\">我始終相信，卓越的團隊來自合理的制度與真誠的溝通——制度給予方向，溝通建立信任。這些年帶領不管是內勤行政團隊或是業務團隊，皆締造亮眼成績佳績，常年獲得公司內部的典範主管金獎，也持續蟬聯 IDA國際龍獎主管獎榮譽，但比起數字，更讓我珍惜的是看著夥伴一步步從新人成長為獨當一面的主管，直至成功。<\u002Fp><p style=\"font-size:16px; line-height:2; color:{{optD.theme.muted}};\">工作之餘，也喜歡多項戶外運動，更享受旅遊帶來的休憩時光，慶幸這些都可以在這份工作中得到滿足。如果您也在尋找值得託付的夥伴，或對保險行業有興趣，歡迎與我聯繫，討論如何協助您創造未來坦途。<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{optD.isSkills}}\" hint-placeholder-val=\"{{false}}\">\n            <div key=\"d-skills\" style=\"animation:panelIn .55s ease;\">\n              <h2 style=\"font-family:'Bodoni Moda',serif; font-size:34px; font-weight:600; margin:0 0 28px;\">專業能力<\u002Fh2>\n              <div style=\"display:flex; flex-direction:column; gap:0;\">\n                <sc-for list=\"{{skills}}\" as=\"s\" hint-placeholder-count=\"6\">\n                  <div style=\"display:flex; gap:20px; padding:18px 0; border-bottom:1px solid {{optD.theme.border}};\">\n                    <div style=\"width:34px; flex-shrink:0; display:flex; align-items:flex-start; padding-top:2px;\">\n                      <svg sc-camel-view-box=\"0 0 24 24\" width=\"22\" height=\"22\" fill=\"none\" stroke=\"{{optD.theme.accent}}\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"{{s.icon}}\"><\u002Fpath><\u002Fsvg>\n                    <\u002Fdiv>\n                    <div>\n                      <div style=\"font-size:17px; font-weight:700; margin-bottom:4px;\">{{s.title}}<\u002Fdiv>\n                      <div style=\"font-size:14px; color:{{optD.theme.muted}}; line-height:1.7;\">{{s.desc}}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{optD.isPortfolio}}\" hint-placeholder-val=\"{{false}}\">\n            <div key=\"d-portfolio\" style=\"animation:panelIn .55s ease;\">\n              <h2 style=\"font-family:'Bodoni Moda',serif; font-size:34px; font-weight:600; margin:0 0 28px;\">領導成效<\u002Fh2>\n              <div style=\"display:flex; flex-direction:column; gap:16px;\">\n                <sc-for list=\"{{portfolioItems}}\" as=\"p\" hint-placeholder-count=\"3\">\n                  <div style=\"border:1px solid {{optD.theme.border}}; border-radius:12px; padding:22px 24px; background:{{optD.theme.surface}}; display:flex; justify-content:space-between; gap:20px; flex-wrap:wrap;\">\n                    <div>\n                      <div style=\"font-size:18px; font-weight:700; margin-bottom:8px;\">{{p.title}}<\u002Fdiv>\n                      <div style=\"font-size:14px; color:{{optD.theme.muted}}; line-height:1.7; max-width:480px;\">{{p.desc}}<\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"font-size:12px; color:{{optD.theme.accent}}; font-weight:700; white-space:nowrap;\">{{p.edit}}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{optD.isBlog}}\" hint-placeholder-val=\"{{false}}\">\n            <div key=\"d-blog\" style=\"animation:panelIn .55s ease;\">\n              <h2 style=\"font-family:'Bodoni Moda',serif; font-size:34px; font-weight:600; margin:0 0 28px;\">管理筆記<\u002Fh2>\n              <div style=\"display:flex; flex-direction:column; gap:0;\">\n                <sc-for list=\"{{blogPosts}}\" as=\"b\" hint-placeholder-count=\"3\">\n                  <div style=\"padding:18px 0; border-bottom:1px solid {{optD.theme.border}}; display:flex; justify-content:space-between; gap:20px; flex-wrap:wrap;\">\n                    <div>\n                      <div style=\"font-size:18px; font-weight:700; margin-bottom:6px;\">{{b.title}}<\u002Fdiv>\n                      <div style=\"font-size:14px; color:{{optD.theme.muted}}; line-height:1.7; max-width:520px;\">{{b.excerpt}}<\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"font-size:13px; color:{{optD.theme.accent}}; font-weight:700; white-space:nowrap;\">{{b.date}}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{optD.isContact}}\" hint-placeholder-val=\"{{false}}\">\n            <div key=\"d-contact\" style=\"animation:panelIn .55s ease; max-width:480px;\">\n              <h2 style=\"font-family:'Bodoni Moda',serif; font-size:34px; font-weight:600; margin:0 0 24px;\">聯絡方式<\u002Fh2>\n              <div style=\"font-size:16px; line-height:2; color:{{optD.theme.muted}}; margin-bottom:20px;\">\n                <div>Email：neo0935@gmail.com<\u002Fdiv>\n                <div>電話：0935-818-346<\u002Fdiv>\n              <\u002Fdiv>\n              <a href=\"mailto:contact@example.com\" style=\"display:inline-block; background:{{optD.theme.accent}}; color:{{optD.theme.accentText}}; font-weight:700; font-size:15px; padding:14px 30px; border-radius:8px; text-decoration:none; margin-bottom:28px;\">預約諮詢<\u002Fa>\n              <div style=\"display:flex; gap:12px;\">\n                <sc-for list=\"{{socials}}\" as=\"soc\" hint-placeholder-count=\"4\">\n                  <a href=\"{{soc.href}}\" target=\"_blank\" rel=\"noopener\" style=\"width:44px; height:44px; border-radius:50%; border:1px solid {{optD.theme.border}}; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:{{optD.theme.text}}; text-decoration:none;\">{{soc.short}}<\u002Fa>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n        <\u002Fmain>\n\n        \n      <\u002Fsection>\n    <\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    themeById: { d: 'dark' },\n    tabById: { d: 'home' },\n    isMobile: false,\n  };\n\n  nav = [\n    { key: 'home', label: '首頁' },\n    { key: 'about', label: '關於我' },\n    { key: 'skills', label: '專業能力' },\n    { key: 'portfolio', label: '領導成效' },\n    { key: 'blog', label: '管理筆記' },\n    { key: 'contact', label: '聯絡' },\n  ];\n\n  configs = {\n    d: {\n      dark: { bg:'#0B1420', surface:'#101B2B', text:'#E9EEF3', muted:'#93A2B3', accent:'#B9C4CE', accentText:'#0B1420', border:'#24344A' },\n      light:{ bg:'#F3F6F9', surface:'#FFFFFF', text:'#101B2B', muted:'#5B6B7D', accent:'#46607A', accentText:'#FFFFFF', border:'#D7DEE6' },\n    },\n  };\n\n  componentDidMount() {\n    try {\n      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;\n      this.setState(s => ({ themeById: { d: prefersDark ? 'dark' : 'light' } }));\n    } catch (e) {}\n    try {\n      this.mq = window.matchMedia('(max-width: 767px)');\n      this.setState({ isMobile: this.mq.matches });\n      this.onMqChange = (e) => this.setState({ isMobile: e.matches });\n      this.mq.addEventListener ? this.mq.addEventListener('change', this.onMqChange) : this.mq.addListener(this.onMqChange);\n    } catch (e) {}\n  }\n\n  componentWillUnmount() {\n    try {\n      if (this.mq && this.onMqChange) {\n        this.mq.removeEventListener ? this.mq.removeEventListener('change', this.onMqChange) : this.mq.removeListener(this.onMqChange);\n      }\n    } catch (e) {}\n  }\n\n  toggleTheme(id) {\n    this.setState(s => ({ themeById: { ...s.themeById, [id]: s.themeById[id] === 'dark' ? 'light' : 'dark' } }));\n  }\n\n  setTab(id, tab) {\n    this.setState(s => ({ tabById: { ...s.tabById, [id]: tab } }));\n  }\n\n  onMove(id, e) {\n    const rect = e.currentTarget.getBoundingClientRect();\n    const x = e.clientX - rect.left;\n    const y = e.clientY - rect.top;\n    const glow = document.getElementById('glow-' + id);\n    if (glow) { glow.style.left = x + 'px'; glow.style.top = y + 'px'; }\n  }\n\n  buildOption(id) {\n    const cfg = this.configs[id];\n    const themeMode = this.state.themeById[id];\n    const theme = themeMode === 'dark' ? cfg.dark : cfg.light;\n    const tab = this.state.tabById[id];\n    const isMobile = this.state.isMobile;\n    const navItems = this.nav.map(n => ({\n      key: n.key,\n      label: n.label,\n      onClick: () => this.setTab(id, n.key),\n      bg: n.key === tab ? theme.accent : 'transparent',\n      color: n.key === tab ? theme.accentText : theme.text,\n    }));\n\n    const sectionStyle = `width:min(96vw,1180px); ${isMobile ? 'height:auto; min-height:100vh;' : 'height:760px;'} border-radius:${isMobile ? '0' : '22px'}; overflow:hidden; position:relative; box-shadow:0 40px 90px rgba(0,0,0,.35); background:${theme.bg}; color:${theme.text}; font-family:'Manrope',sans-serif; transition:background .4s,color .4s; display:flex; flex-direction:${isMobile ? 'column' : 'row'};`;\n\n    const asideStyle = isMobile\n      ? `position:relative; z-index:1; width:100%; flex-shrink:0; display:flex; flex-direction:column; padding:20px 20px 0; border-bottom:1px solid ${theme.border};`\n      : `position:relative; z-index:1; width:280px; flex-shrink:0; display:flex; flex-direction:column; padding:40px 28px; border-right:1px solid ${theme.border};`;\n\n    const identityRowStyle = isMobile\n      ? 'display:flex; align-items:center; gap:14px; margin-bottom:16px; padding-right:90px;'\n      : 'display:block; margin-bottom:0;';\n\n    const avatarStageStyle = `float:right; position:relative; z-index:2; margin:${isMobile ? '0 0 20px 16px' : '0 0 32px 40px'}; width:clamp(130px, ${isMobile ? '34vmin' : '38vmin'}, ${isMobile ? '190px' : '290px'}); aspect-ratio:1/1.15;`;\n\n    const avatarGeoStyle = `position:absolute; top:8%; left:4%; width:82%; height:82%; background:${theme.accent}; opacity:.20; clip-path:polygon(50% 0%, 100% 22%, 100% 78%, 50% 100%, 0% 78%, 0% 22%); z-index:1;`;\n\n    const avatarGeoStyle2 = `position:absolute; bottom:-9%; right:-9%; width:72%; height:72%; background:${theme.accent}; opacity:.30; clip-path:polygon(0% 0%, 100% 0%, 0% 100%); transform:rotate(180deg); z-index:1;`;\n\n    const avatarPhotoStyle = `position:absolute; top:-6%; left:14%; width:92%; height:108%; z-index:2; filter:drop-shadow(0 20px 30px rgba(0,0,0,.45));`;\n\n    const navStyle = isMobile\n      ? 'display:flex; flex-direction:row; gap:8px; overflow-x:auto; padding:0 0 16px; -webkit-overflow-scrolling:touch;'\n      : 'display:flex; flex-direction:column; gap:4px; flex:1;';\n\n    const navItemStyle = isMobile\n      ? \"border:none; text-align:center; font-family:'Manrope',sans-serif; font-size:14px; font-weight:600; padding:10px 18px; border-radius:999px; cursor:pointer; transition:all .25s; white-space:nowrap; flex-shrink:0;\"\n      : \"border:none; text-align:left; font-family:'Manrope',sans-serif; font-size:14px; font-weight:600; padding:11px 14px 11px 14px; border-radius:8px; cursor:pointer; transition:all .25s;\";\n\n    const toggleWrapStyle = isMobile ? 'margin:0 0 16px;' : 'margin-top:20px;';\n\n    const mainStyle = isMobile\n      ? `position:relative; z-index:1; flex:1; padding:28px 20px 48px; overflow-y:auto;`\n      : `position:relative; z-index:1; flex:1; padding:56px; overflow-y:auto; box-sizing:border-box;`;\n\n    const heroColStyle = 'max-width:100%;';\n\n    const heroTitleStyle = `font-family:'Bodoni Moda',serif; line-height:1.2; font-weight:600; margin:0 0 22px; font-size:${isMobile ? '32px' : '48px'};`;\n\n    return {\n      theme,\n      navItems,\n      themeLabel: themeMode === 'dark' ? '淺色' : '深色',\n      toggleTheme: () => this.toggleTheme(id),\n      onMove: (e) => this.onMove(id, e),\n      goContact: () => this.setTab(id, 'contact'),\n      goPortfolio: () => this.setTab(id, 'portfolio'),\n      isHome: tab === 'home',\n      isAbout: tab === 'about',\n      isSkills: tab === 'skills',\n      isPortfolio: tab === 'portfolio',\n      isBlog: tab === 'blog',\n      isContact: tab === 'contact',\n      isMobile,\n      sectionStyle,\n      asideStyle,\n      identityRowStyle,\n      avatarStageStyle,\n      avatarGeoStyle,\n      avatarGeoStyle2,\n      avatarPhotoStyle,\n      navStyle,\n      navItemStyle,\n      toggleWrapStyle,\n      mainStyle,\n      heroColStyle,\n      heroTitleStyle,\n    };\n  }\n\n  renderVals() {\n    return {\n      optD: this.buildOption('d'),\n      skills: [\n        { icon: 'M4 20v-2a5 5 0 0 1 5-5h2a5 5 0 0 1 5 5v2 M10 10a3 3 0 1 0 0-6 3 3 0 0 0 0 6 M17 8a2.5 2.5 0 1 1 0-5 M17 8a4 4 0 0 1 4 4v1', title: '團隊管理', desc: '兼具內、外勤團隊管理經驗，打造高績效團隊' },\n
